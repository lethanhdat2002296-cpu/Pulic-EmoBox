<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theo dõi đơn hàng - EmoBox</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background:#f8fafc; }
    .track-wrap { max-width: 980px; margin: 0 auto; padding: 4rem 1rem 7rem; }
    .track-grid { display:grid; grid-template-columns: 360px 1fr; gap:1.5rem; align-items:start; }
    .panel { background:#fff; border:1px solid var(--border); border-radius:20px; padding:1.5rem; box-shadow:var(--shadow); }
    .form-group { margin-bottom:1rem; }
    .form-label { display:block; font-weight:700; margin-bottom:0.4rem; }
    .form-input { width:100%; padding:0.85rem 1rem; border:1px solid var(--border); border-radius:12px; }
    .status-pill { display:inline-flex; padding:0.3rem 0.7rem; border-radius:999px; background:#e0f2fe; color:#075985; font-weight:700; font-size:0.82rem; }
    .order-item { border-top:1px solid var(--border); padding:0.8rem 0; display:flex; justify-content:space-between; gap:1rem; }
    .tracking-list { margin-top:1.25rem; border-top:1px solid var(--border); padding-top:1rem; }
    .tracking-event { position:relative; padding:0 0 1rem 1.4rem; border-left:2px solid #bae6fd; }
    .tracking-event:last-child { padding-bottom:0; }
    .tracking-event::before { content:''; position:absolute; left:-6px; top:0.2rem; width:10px; height:10px; border-radius:999px; background:#0284c7; }
    .tracking-event strong { display:block; color:#0f3f4a; }
    .tracking-event small { color:var(--text-muted); }
    @media (max-width: 820px) { .track-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="navbar"><div class="container nav-inner"><a href="index.html" class="nav-logo"><img src="Logo.png" alt="EmoBox Logo" style="height:32px"></a><div class="nav-links" id="navLinks"><a href="index.html" class="nav-link">Trang Chủ</a><a href="emotion-gifts.html" class="nav-link">Quà Cảm Xúc</a><a href="occasion-gifts.html" class="nav-link">Quà Theo Dịp</a><a href="plans.html" class="nav-link">Subscription</a><a href="calendar.html" class="nav-link">Đặt Lịch</a><a href="contact.html" class="nav-link">Liên Hệ</a></div><div class="nav-actions"><a href="cart.html" class="btn-icon">🛍️<span class="cart-badge" id="cartBadge">0</span></a><button class="hamburger" onclick="toggleNav()">☰</button></div></div></nav>
  <main class="track-wrap">
    <h1 class="section-title" style="margin-bottom:1rem;">Theo Dõi Đơn Hàng</h1>
    <div class="track-grid">
      <form class="panel" onsubmit="event.preventDefault(); trackOrder();">
        <div class="form-group"><label class="form-label">Mã đơn hàng</label><input id="trackCode" class="form-input" placeholder="VD: EB..." required></div>
        <div class="form-group"><label class="form-label">Email đặt hàng</label><input id="trackEmail" type="email" class="form-input" placeholder="email@example.com"></div>
        <div class="form-group"><label class="form-label">Hoặc số điện thoại</label><input id="trackPhone" class="form-input" placeholder="0912345678"></div>
        <button class="btn btn-primary" style="width:100%;">Tra cứu đơn</button>
      </form>
      <section class="panel" id="orderResult">
        <p style="color:var(--text-muted);">Nhập mã đơn cùng email hoặc số điện thoại để xem trạng thái.</p>
      </section>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <script src="data.js"></script><script src="api.js"></script><script src="app.js"></script>
  <script>
    function statusLabel(value) {
      const map = { paid: 'Đã thanh toán', pending: 'Chờ thanh toán', awaiting_transfer: 'Chờ chuyển khoản', pending_review: 'Chờ đối soát', rejected: 'Thanh toán chưa khớp', cod: 'COD', processing: 'Đang xử lý', delivered: 'Đã giao' };
      return map[value] || value || 'Chưa rõ';
    }

    function renderOrder(order) {
      const items = order.items || [];
      const tracking = order.tracking || [];
      const canConfirm = ['bank_transfer', 'bank'].includes(order.paymentMethod) && order.paymentStatus !== 'paid';
      const trackingHtml = tracking.length
        ? `<div class="tracking-list"><h3 style="margin-bottom:0.8rem;">Lịch sử theo dõi</h3>${tracking.map(event => `
          <div class="tracking-event">
            <strong>${event.title || statusLabel(event.orderStatus || event.paymentStatus)}</strong>
            <small>${event.createdAt ? new Date(event.createdAt).toLocaleString('vi-VN') : ''}</small>
            ${event.message ? `<p style="margin:0.3rem 0 0;color:var(--text-muted);">${event.message}</p>` : ''}
          </div>
        `).join('')}</div>`
        : '';
      document.getElementById('orderResult').innerHTML = `
        <div style="display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;margin-bottom:1rem;">
          <div><h2 style="margin:0 0 0.3rem;">${order.orderCode}</h2><p style="color:var(--text-muted);">Ngày tạo: ${new Date(order.createdAt).toLocaleString('vi-VN')}</p></div>
          <span class="status-pill">${statusLabel(order.paymentStatus)}</span>
        </div>
        <p>Trạng thái đơn: <strong>${statusLabel(order.orderStatus)}</strong></p>
        <p>Người nhận: <strong>${order.contact.name}</strong> - ${order.contact.phone}</p>
        <p>Địa chỉ: ${order.contact.address}</p>
        <div style="margin-top:1rem;">${items.map(item => `<div class="order-item"><span>${item.name} x${item.quantity}</span><strong>${formatPrice(Number(item.lineTotal || 0))}</strong></div>`).join('')}</div>
        <div style="border-top:1px solid var(--border);margin-top:1rem;padding-top:1rem;font-size:1.1rem;">Tổng cộng: <strong>${formatPrice(order.total)}</strong></div>
        ${trackingHtml}
        ${canConfirm ? `
          <div style="margin-top:1.25rem;background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;padding:1rem;">
            <h3 style="margin-bottom:0.75rem;">Bổ sung đối soát chuyển khoản</h3>
            <input id="confirmReference" class="form-input" placeholder="Mã giao dịch / nội dung chuyển khoản" style="margin-bottom:0.75rem;">
            <input id="confirmProof" class="form-input" type="file" accept="image/*,.pdf" style="margin-bottom:0.75rem;">
            <button class="btn btn-primary" onclick="confirmTransfer('${order.orderCode}')">Gửi thông tin đối soát</button>
          </div>` : ''}
      `;
    }

    async function trackOrder() {
      const user = JSON.parse(localStorage.getItem('emobox_user') || 'null');
      const result = await EmoBoxApi.trackOrder(
        document.getElementById('trackCode').value.trim(),
        document.getElementById('trackEmail').value.trim(),
        document.getElementById('trackPhone').value.trim(),
        user
      );
      if (!result.ok || !result.order) {
        document.getElementById('orderResult').innerHTML = `<p style="color:#ef4444;">${result.error || 'Không tìm thấy đơn hàng.'}</p>`;
        return;
      }
      renderOrder(result.order);
    }

    function readProofFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          resolve('');
          return;
        }
        if (file.size > 900 * 1024) {
          reject(new Error('Biên lai tối đa 900KB. Vui lòng nén ảnh trước khi gửi.'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || '');
        reader.onerror = () => reject(new Error('Không đọc được file biên lai.'));
        reader.readAsDataURL(file);
      });
    }

    async function confirmTransfer(orderCode) {
      const file = document.getElementById('confirmProof').files[0];
      let paymentProofUrl = '';
      try {
        paymentProofUrl = await readProofFileAsDataUrl(file);
      } catch (err) {
        showToast('⚠ ' + err.message);
        return;
      }
      const result = await EmoBoxApi.confirmBankTransfer(orderCode, {
        paymentReference: document.getElementById('confirmReference').value.trim(),
        paymentProofUrl,
        bankTransferNote: file ? `Khách tải biên lai: ${file.name}` : ''
      }, JSON.parse(localStorage.getItem('emobox_user') || 'null'));
      showToast(result.ok ? 'Đã gửi thông tin đối soát. EmoBox sẽ xác nhận sớm.' : (result.error || 'Không gửi được đối soát.'));
      if (result.ok) trackOrder();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const lastOrder = JSON.parse(localStorage.getItem('emobox_last_order') || '{}');
      document.getElementById('trackCode').value = params.get('code') || lastOrder.orderCode || '';
      document.getElementById('trackEmail').value = lastOrder.email || '';
    });
  </script>
</body>
</html>
