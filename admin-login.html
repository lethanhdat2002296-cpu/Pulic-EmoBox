<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - EmoBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef6fb;
      color: #0f172a;
      font-family: Inter, system-ui, sans-serif;
    }
    .login-card {
      width: min(420px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid #b9ddf3;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand img { height: 34px; }
    .brand span { font-weight: 800; color: #0369a1; }
    h1 { margin: 0 0 8px; font-size: 1.65rem; }
    p { margin: 0 0 24px; color: #64748b; line-height: 1.5; }
    label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #334155; }
    input {
      width: 100%;
      height: 46px;
      border: 1px solid #b9ddf3;
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #0284c7; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.12); }
    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 8px;
      background: #0284c7;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    button:disabled { opacity: 0.65; cursor: wait; }
    .hint { margin-top: 16px; font-size: 0.82rem; color: #64748b; }
    .error { display: none; margin: 0 0 16px; padding: 10px 12px; border-radius: 8px; background: #fee2e2; color: #991b1b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <img src="Logo.png" alt="EmoBox">
      <span>Admin</span>
    </div>
    <h1>Đăng nhập quản trị</h1>
    <p>Dành riêng cho admin EmoBox để xem báo cáo, đối soát thanh toán và quản lý vận hành.</p>
    <div class="error" id="loginError"></div>
    <form id="loginForm">
      <label for="email">Email admin</label>
      <input id="email" type="email" autocomplete="username" required>
      <label for="password">Mật khẩu</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button id="loginBtn" type="submit">Đăng nhập</button>
    </form>
    <div class="hint">Tài khoản đầu tiên được tạo từ biến môi trường <strong>ADMIN_EMAIL</strong> và <strong>ADMIN_PASSWORD</strong>.</div>
  </main>

  <script>
    if (localStorage.getItem('emobox_admin_token')) {
      window.location.href = 'admin.html';
    }

    async function adminLogin(email, password) {
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      const errorBox = document.getElementById('loginError');
      const button = document.getElementById('loginBtn');
      errorBox.style.display = 'none';
      button.disabled = true;
      button.textContent = 'Đang đăng nhập...';

      try {
        const result = await adminLogin(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        localStorage.setItem('emobox_admin_token', result.token);
        localStorage.setItem('emobox_admin_user', JSON.stringify(result.admin || {}));
        window.location.href = 'admin.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } finally {
        button.disabled = false;
        button.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
